<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Solver Settings</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header stagger-1">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"></path>
      </svg>
    </div>
    <h1>FORM_SOLVER</h1>
    <p class="subtitle">AUTOMATED ENGINEERING DIAGNOSTICS</p>
  </div>

  <div class="section stagger-2">
    <div class="section-title">[ SYS.USER_DETAILS ]</div>

    <div class="field">
      <label for="userName">FULL NAME</label>
      <input type="text" id="userName" placeholder="e.g. Varun Sharma">
    </div>

    <div class="field">
      <label for="userEmail">EMAIL</label>
      <input type="email" id="userEmail" placeholder="e.g. varun@college.edu">
    </div>

    <div class="field-row">
      <div class="field">
        <label for="userRollNo">ROLL NO</label>
        <input type="text" id="userRollNo" placeholder="e.g. 42">
      </div>
      <div class="field">
        <label for="userDiv">DIV</label>
        <input type="text" id="userDiv" placeholder="e.g. A">
      </div>
    </div>

    <div class="field">
      <label for="userBranch">BRANCH</label>
      <input type="text" id="userBranch" placeholder="e.g. Computer Science">
    </div>
  </div>

  <div class="section stagger-3">
    <div class="section-title">[ API.CONFIG ]</div>

    <div class="field">
      <label for="apiKey">GEMINI KEY <span class="provider-badge primary">PRIMARY</span> <a href="https://aistudio.google.com/app/apikey" target="_blank" class="key-link">(GENERATE)</a></label>
      <div class="api-key-wrapper">
        <input type="password" id="apiKey" placeholder="Paste Gemini key">
        <button id="toggleKey" class="toggle-btn" title="Toggle Visibility">👁️</button>
      </div>
    </div>

    <div class="field">
      <label for="groqApiKey">GROQ KEY <span class="provider-badge fallback">FALLBACK</span> <a href="https://console.groq.com/keys" target="_blank" class="key-link">(GENERATE)</a></label>
      <div class="api-key-wrapper">
        <input type="password" id="groqApiKey" placeholder="Paste Groq key (optional)">
        <button id="toggleGroqKey" class="toggle-btn" title="Toggle Visibility">👁️</button>
      </div>
    </div>

    <div id="providerStatus" class="provider-status">
      <span class="status-dot active"></span>
      <span id="providerLabel">GEMINI_ONLY</span>
    </div>
  </div>

  <button id="saveBtn" class="save-btn stagger-4">
    <span class="save-text">INITIALIZE_SETTINGS</span>
  </button>

  <div id="statusMsg" class="status-msg stagger-4"></div>

  <div class="footer stagger-4">
    <span>v3.5</span>
    <span id="footerEngine" style="color: var(--accent);">DUAL_CORE_READY</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
